name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Download Stats Card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=Bolice1&show_icons=true&theme=tokyonight&hide_border=true&count_private=true&rank_icon=github" \
            -o assets/stats.svg

      - name: Download Top Languages Card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=Bolice1&layout=compact&theme=tokyonight&hide_border=true&count_private=true" \
            -o assets/langs.svg

      - name: Download Streak Card
        run: |
          curl -s "https://streak-stats.demolab.com?user=Bolice1&theme=tokyonight&hide_border=true" \
            -o assets/streak.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/langs.svg assets/streak.svg
          git diff --cached --quiet || git commit -m "chore: update GitHub stats cards"
          git push
