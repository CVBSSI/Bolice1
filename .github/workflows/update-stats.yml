name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Download Stats Card
        run: |
          curl -s \
            -H "Authorization: token ${{ secrets.STATS_TOKEN }}" \
            "https://github-readme-stats.vercel.app/api?username=Bolice1&show_icons=true&theme=tokyonight&hide_border=true&count_private=true&rank_icon=github&cache_seconds=3600" \
            -o assets/stats.svg
          # Verify it's an actual SVG, not an error page
          head -1 assets/stats.svg | grep -q "<svg" || echo "WARNING: stats.svg may be invalid"

      - name: Download Top Languages Card
        run: |
          curl -s \
            -H "Authorization: token ${{ secrets.STATS_TOKEN }}" \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=Bolice1&layout=compact&theme=tokyonight&hide_border=true&count_private=true&cache_seconds=3600" \
            -o assets/langs.svg
          head -1 assets/langs.svg | grep -q "<svg" || echo "WARNING: langs.svg may be invalid"

      - name: Download Streak Card
        run: |
          curl -s \
            "https://streak-stats.demolab.com?user=Bolice1&theme=tokyonight&hide_border=true" \
            -o assets/streak.svg
          head -1 assets/streak.svg | grep -q "<svg" || echo "WARNING: streak.svg may be invalid"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/langs.svg assets/streak.svg
          git diff --cached --quiet || git commit -m "chore: update GitHub stats cards"
          git push
